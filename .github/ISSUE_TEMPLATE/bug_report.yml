name: Bug report
description: Report a reproducible bridge problem
title: "[Bug]: "
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Privacy check
      options:
        - label: I removed tokens, user ids, context tokens, personal messages, and private paths from logs.
          required: true
  - type: input
    attributes:
      label: Windows version
    validations:
      required: true
  - type: input
    attributes:
      label: Node and Codex versions
    validations:
      required: true
  - type: textarea
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    attributes:
      label: Sanitized log excerpt
